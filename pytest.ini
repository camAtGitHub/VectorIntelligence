[pytest]
# Repo-root runner: python3 -m pytest
# Collect unit tests under shared/ (supervisor + vector-ai).
testpaths =
    shared
python_files = test_*.py
python_functions = test_*
# so `import supervisor` and `import behaviors` work without manual sys.path hacks
pythonpath =
    shared
    shared/vector-ai
# silence pytest-asyncio deprecation (Debian python3-pytest-asyncio)
asyncio_default_fixture_loop_scope = function
# filter noise from system plugins when no async fixtures are used
filterwarnings =
    ignore::DeprecationWarning:pytest_asyncio.*
